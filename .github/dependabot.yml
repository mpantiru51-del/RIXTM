version: 2

updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Europe/London
    open-pull-requests-limit: 5
    groups:
      contract-dependencies:
        patterns:
          - "*"

  - package-ecosystem: npm
    directory: /rixtm-website
    schedule:
      interval: weekly
      day: monday
      time: "06:15"
      timezone: Europe/London
    open-pull-requests-limit: 5
    groups:
      website-dependencies:
        patterns:
          - "*"

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:30"
      timezone: Europe/London
    open-pull-requests-limit: 5
    groups:
      workflow-dependencies:
        patterns:
          - "*"

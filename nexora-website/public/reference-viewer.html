<!doctype html>
<html lang="ro">
  <head>
    <meta charset="utf-8" />
    <title>Referință video</title>
    <style>
      html, body { margin: 0; min-height: 100%; background: #000; }
      body { display: grid; place-items: center; }
      video { width: min(100vw, 720px); height: 100vh; object-fit: contain; }
    </style>
  </head>
  <body>
    <video id="reference" src="/reference.mp4" controls muted playsinline></video>
    <script>
      const video = document.querySelector("#reference");
      const time = Number(new URLSearchParams(location.search).get("t") || 0);
      video.addEventListener("loadedmetadata", () => {
        video.currentTime = Math.min(Math.max(time, 0), video.duration);
        video.pause();
      });
    </script>
  </body>
</html>
